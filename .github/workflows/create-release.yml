name: Generate release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  packages: write
  pull-requests: read

jobs:      
  release:
    runs-on: ubuntu-latest
    steps:
      - name: "Create release"
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          prerelease: true
          
